name: Deploy Lemobici API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test-lemobici-api.yml
    
  deploy:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Optionnel : préparer une archive propre
      - name: Prepare deployment archive
        run:  |
          # Créer dans un sous-dossier pour éviter la boucle tar
          mkdir -p /tmp/deploy
          tar czf /tmp/deploy/deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            .
          # Déplacer vers le workspace pour que l'action y accède
          mv /tmp/deploy/deploy.tar.gz ./deploy.tar.gz

      - name: Transfer to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "deploy.tar.gz"
          target: "/opt/lemobici/tmp"

      - name: Deploy with zero downtime
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e  # Arrêt sur erreur
            
            cd /opt/lemobici
            
            # Arrêter le conteneur api existant
            docker stop lemobici-api-container 2>/dev/null || true
            docker rm -f lemobici-api-container 2>/dev/null || true
            
            # Backup du code
            if [ -d "lemobici-api" ]; then
              mv lemobici-api lemobici-api.backup.$(date +%s)
            fi
            
            # Extraction
            mkdir -p lemobici-api
            tar xzf tmp/deploy.tar.gz -C lemobici-api
            rm -f tmp/deploy.tar.gz

            # Configuration de l'env de l'API
            cp .env.api.dev lemobici-api/.env
            
            # Build et démarrage
            docker compose -f docker-compose-dev.yml --env-file .env.dev build api
            docker compose -f docker-compose-dev.yml --env-file .env.dev up -d api
            
            # Health check
            sleep 5
            docker ps --filter "name=lemobici-api-container" --format "table {{.Names}}\t{{.Status}}"
            
            echo "Deployment API finished ••• 1 ⚔️ ••• ✅"